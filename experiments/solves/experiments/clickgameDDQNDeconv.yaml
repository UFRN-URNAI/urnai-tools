---
- action_wrapper:
    class: ClickGameDeconvWrapper
    params: 
      size_x: 10
      size_y: 10
  state_builder:
    class: FlatState
    params: 
      state_dim: 100
  reward:
    class: PureReward
    params: {}
  env:
    class: ClickGameEnv
    params:
      render: false
      board_shape: [10, 10]
      max_steps: 200
      use_marine: false
      marine_value: 0.1
  model:
    class: DDQN_Deconv
    params:
      per_episode_epsilon_decay: true
      batch_size: 32
      epsilon_decay: 0.998
      epsilon_linear_decay: true
      epsilon_min: 0
      epsilon_start: 0.8
      learning_rate: 0.001
      memory_maxlen: 50000
      min_memory_size: 128
      model_layers: [64]
      use_deconv: true
  agent:
    class: GenericAgent
    params: {}
  trainer:
    class: Trainer
    params:
      save_path: "../agentes-treinados-tcc/click-game"
      file_name: ddqn-10x10-relu-deconv-3
      save_every: 50
      enable_save: true
      relative_path: true
      reset_epsilon: false
      max_training_episodes: 300
      max_steps_training: 300
      max_test_episodes: 100
      max_steps_testing: 300
      rolling_avg_window_size: 20