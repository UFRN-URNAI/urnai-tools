---
- action_wrapper:
    class: DefeatRoachesActionGroup
    params:
      max_group_amount: 2
      x_gridsize: 10
      y_gridsize: 10
      random_uniform: true
  state_builder:
    class: DefeatRoachesState_simple
    params: {}
  reward:
    class: PureReward
    params: {}
  env:
    class: SC2Env
    params:
      map_name: DefeatRoaches
      render: false
      step_mul: 8
      player_race: terran
      enemy_race: terran
      difficulty: very_easy
  model:
    class: DDQNKerasMO
    params:
      per_episode_epsilon_decay: true
      epsilon_decay: 0.995
      epsilon_min: 0.005
      memory_maxlen: 70000
      min_memory_size: 128
      model_layers: [36, 28]
  agent:
    class: SC2Agent
    params: {}
  trainer:
    class: Trainer
    params:
      save_path: "../agentes-treinados-tcc/defeat-roaches"
      file_name: defeatroaches_actgroup_01
      save_every: 50
      enable_save: true
      relative_path: true
      reset_epsilon: false
      max_training_episodes: 600
      max_steps_training: 300
      max_test_episodes: 10
      max_steps_testing: 300
      rolling_avg_window_size: 20
