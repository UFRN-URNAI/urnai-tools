---
- action_wrapper:
    class: DefeatRoachesActionGroup
    params:
      max_group_amount: 2
      x_gridsize: 10
      y_gridsize: 10
      random_uniform: true
  state_builder:
    class: TransferLearningState
    params:
       max_num_marines: 9
       max_num_other: 8
  reward:
    class: PureReward
    params: {}
  env:
    class: SC2Env
    params:
      #map_name: MoveToBeacon
      #map_name: CollectMineralShards
      map_name: [MoveToBeacon, CollectMineralShards, DefeatRoaches]
      amount_each_map: 10
      render: false
      step_mul: 8
      player_race: terran
      enemy_race: terran
      difficulty: very_easy
  model:
    class: DDQNKerasMO
    params:
      per_episode_epsilon_decay: true
      epsilon_decay: 0.995
      epsilon_min: 0.001
      memory_maxlen: 100000
      min_memory_size: 128
      model_layers: [48, 32]
  agent:
    class: SC2Agent
    params: {}
  trainer:
    class: Trainer
    params:
      save_path: "../agentes-treinados-tcc/transfer-learning"
      file_name: transferlearning_03
      save_every: 50
      enable_save: true
      relative_path: true
      reset_epsilon: false
      max_training_episodes: 600
      max_steps_training: 300
      max_test_episodes: 0
      max_steps_testing: 300
      rolling_avg_window_size: 20
