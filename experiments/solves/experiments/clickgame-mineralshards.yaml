---
- action_wrapper:
    class: MoveToBeaconActionWrapper
    params:
      x_gridsize: 10
      y_gridsize: 10
      random_uniform: true
  state_builder:
    class: MiniGameGridState
    params: {}
  reward:
    class: PureReward
    params: {}
  env:
    class: SC2Env
    params:
      map_name: CollectMineralShards
      realtime: false
      render: false
      step_mul: 8
      player_race: terran
      enemy_race: terran
      difficulty: very_easy
  model:
    class: DDQNKerasMO
    params:
      per_episode_epsilon_decay: true
      learning_rate: 0.001
      epsilon_decay: 0.992
      epsilon_min: 0.005
      memory_maxlen: 50000
      min_memory_size: 128
      batch_size: 32
      model_layers: [60]
  agent:
    class: SC2Agent
    params: {}
  trainer:
    class: Trainer
    params:
      save_path: "../agentes-treinados-tcc/transfer-learning"
      file_name: clickgame-mineralshards-sigmoid-01
      save_every: 50
      enable_save: true
      relative_path: true
      reset_epsilon: false
      max_training_episodes: 700
      max_steps_training: 300
      max_test_episodes: 100
      max_steps_testing: 300
      rolling_avg_window_size: 20
