---
- action_wrapper:
    class: ClickGameDDQNWrapper
    params: 
      size_x: 20
      size_y: 10
  state_builder:
    class: FlatState
    params: 
      state_dim: 200
  reward:
    class: PureReward
    params: {}
  env:
    class: ClickGameEnv
    params:
      render: false
      board_shape: [20, 10]
      max_steps: 300
      use_marine: false
      marine_value: 0.1
  model:
    class: DDQNKeras
    params:
      batch_size: 32
      epsilon_decay: 0.998
      epsilon_linear_decay: true
      epsilon_min: 0
      epsilon_start: 0.8
      learning_rate: 0.0001
      memory_maxlen: 50000
      min_memory_size: 128
      model_layers: [200]
      per_episode_epsilon_decay: true
  agent:
    class: GenericAgent
    params: {}
  trainer:
    class: Trainer
    params:
      save_path: "../agentes-treinados-tcc/click-game"
      file_name: ddqn-20x10-200n-relu-e0-8
      save_every: 50
      enable_save: true
      relative_path: true
      reset_epsilon: false
      max_training_episodes: 451
      max_steps_training: 600
      max_test_episodes: 100
      max_steps_testing: 600
      rolling_avg_window_size: 20

