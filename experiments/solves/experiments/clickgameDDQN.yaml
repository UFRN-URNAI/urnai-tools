---
- action_wrapper:
    class: ClickGameDDQNWrapper
    params: 
      size_x: 21
      size_y: 15
  state_builder:
    class: FlatState
    params: 
      state_dim: 315
  reward:
    class: PureReward
    params: {}
  env:
    class: ClickGameEnv
    params:
      render: false
      board_shape: [21, 15]
      max_steps: 200
      use_marine: false
      marine_value: 0.1
  model:
    class: DDQNKeras
    params:
      per_episode_epsilon_decay: true
      learning_rate: 0.0001
      epsilon_decay: 0.998
      epsilon_start: 0.8
      epsilon_min: 0
      epsilon_linear_decay: true
      memory_maxlen: 50000
      min_memory_size: 128
      batch_size: 32
      model_layers: [100]
  agent:
    class: GenericAgent
    params: {}
  trainer:
    class: Trainer
    params:
      save_path: "../agentes-treinados-tcc/click-game"
      file_name: ddqn-21x15-100n-relu
      save_every: 50
      enable_save: true
      relative_path: true
      reset_epsilon: false
      max_training_episodes: 300
      max_steps_training: 300
      max_test_episodes: 100
      max_steps_testing: 300
      rolling_avg_window_size: 20

