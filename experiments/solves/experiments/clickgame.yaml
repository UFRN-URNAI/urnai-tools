---
- action_wrapper:
    class: ClickGameBDQWrapper
    params:
      x_gridsize: 10
      y_gridsize: 10
  state_builder:
    class: FlatState
    params: 
      state_dim: 100
  reward:
    class: PureReward
    params: {}
  env:
    class: ClickGameEnv
    params:
      render: false
      board_shape: [10, 10]
      max_steps: 200
      use_marine: false
      marine_value: 0.1
  model:
    class: BDQ
    params:
      per_episode_epsilon_decay: true
      learning_rate: 0.0001
      epsilon_decay: 0.992
      epsilon_min: 0
      memory_maxlen: 50000
      min_memory_size: 128
      batch_size: 32
  agent:
    class: GenericAgent
    params: {}
  trainer:
    class: Trainer
    params:
      save_path: "../agentes-treinados-tcc/click-game"
      file_name: bdq-sigmoid-04-lr0-0001
      save_every: 50
      enable_save: true
      relative_path: true
      reset_epsilon: false
      max_training_episodes: 400
      max_steps_training: 300
      max_test_episodes: 100
      max_steps_testing: 300
      rolling_avg_window_size: 20
