- action_wrapper:
    class: CGSubdivWrapper
    params:
      x_gridsize: 16
      y_gridsize: 16
  agent:
    class: GenericAgent
    params: {}
  env:
    class: ClickGameEnv
    params:
      board_shape:
      - 16
      - 16
      marine_value: 0.1
      max_steps: 512
      render: false
      use_marine: false
  model:
    class: DDQNKerasMO
    params:
      batch_size: 32
      epsilon_decay: 0.995
      epsilon_linear_decay: true
      epsilon_decay_ep_start: 50
      epsilon_min: 0.05
      epsilon_start: 0.8
      learning_rate: 0.001
      memory_maxlen: 50000
      min_memory_size: 4000
      model_layers:
      - 150
      per_episode_epsilon_decay: true
  reward:
    class: PureReward
    params: {}
  state_builder:
    class: FlatState
    params:
      state_dim: 256
  trainer:
    class: Trainer
    params:
      enable_save: true
      file_name: ddqnmo-subdiv16x16-150n-sigmoid
      max_steps_testing: 600
      max_steps_training: 600
      max_test_episodes: 100
      max_training_episodes: 200
      relative_path: true
      reset_epsilon: false
      rolling_avg_window_size: 20
      save_every: 50
      save_path: ../agentes-treinados-tcc/click-game
